<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Shop | VELOCE</title>
    <meta name="description" content="Browse our curated collection of industrial electronics, motors, and precision sensors. Engineered for performance and reliability.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="products" data-products-base="../">
    <header>
        <nav>
            <a href="../index.html" class="logo">VELOCE <span>LABS</span></a>

            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="login.html" data-auth-link>Login</a></li>
                <li><a href="profile.html" data-profile-link>Profile</a></li>
            </ul>

            <div class="nav-controls">
                <div class="theme-switch">
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-input">
                        <span class="slider"></span>
                    </label>
                </div>

                <a href="cart.html" class="cart-icon">
                    🛒 <span class="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main>
        <section class="max-w-6xl mx-auto px-6 pt-10" data-aos="fade-up">
            <div class="rounded-3xl border border-blue-500/20 bg-gradient-to-r from-blue-600/20 via-white/5 to-transparent p-6 shadow-xl shadow-blue-900/20">
                <p class="text-xs font-bold uppercase tracking-[0.35em] text-blue-400">Tailwind Product Console</p>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="rounded-2xl bg-black/30 p-4 border border-white/10">
                        <p class="text-2xl font-black text-white">40+</p>
                        <p class="text-sm text-slate-400">curated electronics</p>
                    </div>
                    <div class="rounded-2xl bg-black/30 p-4 border border-white/10">
                        <p class="text-2xl font-black text-white">5</p>
                        <p class="text-sm text-slate-400">smart categories</p>
                    </div>
                    <div class="rounded-2xl bg-black/30 p-4 border border-white/10">
                        <p class="text-2xl font-black text-white">Fast</p>
                        <p class="text-sm text-slate-400">cart + detail navigation</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="shop-layout" data-aos="fade-up" data-aos-delay="150">
            <aside class="filter-sidebar" data-aos="fade-right">
                <h3>Categories</h3>
                <ul id="category-filters" class="filter-list">
                    <li><label class="filter-label"><input type="radio" name="category" value="all" checked> All Products</label></li>
                    <li><label class="filter-label"><input type="radio" name="category" value="Microcontrollers"> Microcontrollers</label></li>
                    <li><label class="filter-label"><input type="radio" name="category" value="Development Boards"> Development Boards</label></li>
                    <li><label class="filter-label"><input type="radio" name="category" value="Sensors"> Sensors</label></li>
                    <li><label class="filter-label"><input type="radio" name="category" value="Components"> Components</label></li>
                    <li><label class="filter-label"><input type="radio" name="category" value="Batteries"> Batteries</label></li>
                </ul>
            </aside>

            <section class="shop-main" data-aos="fade-left">
                <div class="shop-header">
                    <h2 id="page-title" class="page-title">PRODUCT <span>SHOP</span></h2>
                    <span id="item-count" class="item-count">Loading...</span>
                </div>

                <div id="product-list" class="product-grid" data-aos="fade-up">
                    <!-- Loaded by js/app.js -->
                </div>
            </section>
        </div>
    </main>

    <footer class="footer-large">
        <div class="logo">VELOCE <span>LABS</span></div>
        <p class="footer-copy">&copy; 2026 VELOCE LABS GMBH. ENGINEERED FOR PRECISION.</p>
    </footer>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
