<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Terminal | VELOCE</title>
    <meta name="description" content="Secure access to the VELOCE Labs operator profile and technical dashboards.">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-box {
            max-width: 500px;
            margin: 80px auto;
            background: var(--bg-surface);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .form-group {
            margin-bottom: 30px;
        }
        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent);
        }
        .form-group input {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">VELOCE <span>LABS</span></a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="nav-controls">
                <div class="theme-switch">
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-input">
                        <span class="slider"></span>
                    </label>
                </div>
                <a href="cart.html" class="cart-icon" style="position: relative; font-size: 1.2rem;">
                    🛒 <span class="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main>
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 40px; font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; text-transform: uppercase;">USER <span style="color: var(--accent);">LOGIN</span></h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Identity (Email)</label>
                    <input type="email" placeholder="OPERATOR@VELOCE.SYSTEMS" required>
                </div>
                <div class="form-group">
                    <label>Key (Password)</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 20px; font-size: 1rem;">Authenticate</button>
            </form>
            <p style="text-align: center; margin-top: 35px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                New operator? <a href="#" style="color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Request Access.</a>
            </p>
        </div>
    </main>

    <footer style="margin-top: 80px;">
        <div class="logo">VELOCE <span>LABS</span></div>
        <p style="color: var(--text-muted); font-size: 0.8rem;">&copy; 2026 VELOCE LABS GMBH. ENGINEERED FOR PRECISION.</p>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast("AUTHENTICATION SUCCESSFUL. SYNCING PROFILE.");
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 1500);
        });
    </script>
</body>
</html>
