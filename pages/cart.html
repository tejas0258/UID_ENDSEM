<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | VELOCE</title>
    <meta name="description" content="Review your technical manifest and proceed to checkout. Precision components, ready for deployment.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="cart" data-products-base="../">
    <header>
        <nav>
            <a href="../index.html" class="logo">VELOCE <span>LABS</span></a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="login.html" data-auth-link>Login</a></li>
                <li><a href="profile.html" data-profile-link>Profile</a></li>
            </ul>
            <div class="nav-controls">
                <div class="theme-switch">
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-input">
                        <span class="slider"></span>
                    </label>
                </div>
                <a href="cart.html" class="cart-icon">
                    🛒 <span class="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="cart-page-title" data-aos="fade-right">MY <span class="accent">CART</span></h1>
        <section class="max-w-6xl mx-auto px-6 pb-8" data-aos="fade-up">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="rounded-2xl border border-blue-500/20 bg-white/5 p-5">
                    <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-bold">Shipping</p>
                    <p class="mt-2 text-white text-xl font-black">Free delivery</p>
                </div>
                <div class="rounded-2xl border border-blue-500/20 bg-white/5 p-5">
                    <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-bold">Storage</p>
                    <p class="mt-2 text-white text-xl font-black">Cart saved safely</p>
                </div>
                <div class="rounded-2xl border border-blue-500/20 bg-white/5 p-5">
                    <p class="text-xs uppercase tracking-[0.3em] text-blue-400 font-bold">Checkout</p>
                    <p class="mt-2 text-white text-xl font-black">Project ready</p>
                </div>
            </div>
        </section>
        <div id="cart-content" class="cart-container" data-aos="fade-up" data-aos-delay="150">
            <!-- Loaded by js/app.js -->
        </div>
    </main>

    <footer>
        <div class="logo">VELOCE <span>LABS</span></div>
        <p class="footer-copy">&copy; 2026 VELOCE LABS GMBH. ENGINEERED FOR PRECISION.</p>
    </footer>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
